    <meta charset="UTF-8" />

    <title>Thúi House</title>
    <script>
      // Shim to prevent "Cannot set property fetch which has only a getter" error
      (function() {
        /**
         * Some libraries try to polyfill 'fetch' by direct assignment (window.fetch = ...).
         * In certain environments, 'fetch' is a read-only getter, causing a TypeError.
         * This shim attempts to make it writable.
         */
        function makeWritable(target, prop) {
          try {
            let obj = target;
            let descriptor;
            while (obj && !descriptor) {
              descriptor = Object.getOwnPropertyDescriptor(obj, prop);
              if (!descriptor) obj = Object.getPrototypeOf(obj);
            }

            if (descriptor && descriptor.configurable) {
              const original = target[prop];
              let current = original;
              Object.defineProperty(target, prop, {
                get: function() { return current; },
                set: function(v) { current = v; },
                configurable: true,
                enumerable: true
              });
            }
          } catch (e) {
            // Ignore errors
          }
        }

        makeWritable(window, 'fetch');
        makeWritable(window, 'Headers');
        makeWritable(window, 'Request');
        makeWritable(window, 'Response');
        makeWritable(window, 'FormData');

        if (typeof globalThis !== 'undefined') {
          makeWritable(globalThis, 'fetch');
          makeWritable(globalThis, 'Headers');
          makeWritable(globalThis, 'Request');
          makeWritable(globalThis, 'Response');
          makeWritable(globalThis, 'FormData');
        }
        
        // Also ensure 'global' exists for some older polyfills
        if (typeof window !== 'undefined' && typeof window.global === 'undefined') {
          window.global = window;
        }
      })();
    </script>
